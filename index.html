<!DOCTYPE html>
<html>
<head>
    <title>Kruthika's Gallery</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffccd5 100%);
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        h1 {
            color: #ff1493;
            font-size: 2em;
        }
        .bio {
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .category-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .cat-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .cat-btn:hover {
            background-color: #ff1493;
            transform: scale(1.05);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .gallery-item p {
            padding: 10px;
            margin: 0;
            color: #333;
        }
        .section-title {
            color: #ff1493;
            font-size: 1.8em;
            margin: 20px 0;
        }
        .hidden {
            display: none;
        }
        .instagram-link {
            margin-top: 30px;
            font-size: 1.2em;
        }
        a {
            color: #ff1493;
            text-decoration: none;
        }
        footer {
            margin-top: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bio">
            <h1>Hi, I'm Kruthika from Bangalore 💋</h1>
            <p>Would you like to explore me? Then you're in the right place.</p>
            <p>Feel free to DM me – always available for you 💕</p>
            <p>📸 Instagram: <a href="https://www.instagram.com/kruthinaik__" target="_blank">@kruthinaik__</a></p>
        </div>

        <div class="category-buttons">
            <button class="cat-btn" onclick="showCategory('public')">📸 Public</button>
            <button class="cat-btn" onclick="showCategory('homealone')">🏠 Home Alone</button>
            <button class="cat-btn" onclick="showCategory('videos')">🎥 Videos</button>
        </div>

        <!-- Public Section -->
        <div id="public" class="category-section">
            <h2 class="section-title">📸 Public Photos</h2>
            <div class="gallery">
                <div class="gallery-item">
                    <img src="IMG_8409.jpeg" alt="Kruthika">
                    <p>Beautiful Kruthika ✨</p>
                </div>
            </div>
        </div>

        <!-- Home Alone Section -->
        <div id="homealone" class="category-section hidden">
            <h2 class="section-title">🏠 Home Alone</h2>
            <div class="gallery">
                <div class="gallery-item">
                    <img src="https://via.placeholder.com/300x250/dda0dd/white?text=Coming+Soon" alt="Coming Soon">
                    <p>Coming soon 💋</p>
                </div>
            </div>
        </div>

        <!-- Videos Section -->
        <div id="videos" class="category-section hidden">
            <h2 class="section-title">🎥 Videos</h2>
            <div class="gallery">
                <div class="gallery-item">
                    <video controls>
                        <source src="https://via.placeholder.com/300x250/dda0dd/white?text=Coming+Soon" type="video/mp4">
                        Your browser doesn't support video.
                    </video>
                    <p>Coming soon 🎬</p>
                </div>
            </div>
        </div>

        <footer>
            <p>💕 Always available for you 💕</p>
        </footer>
    </div>

    <script>
        function showCategory(category) {
            document.getElementById('public').classList.add('hidden');
            document.getElementById('homealone').classList.add('hidden');
            document.getElementById('videos').classList.add('hidden');
            document.getElementById(category).classList.remove('hidden');
        }
    </script>
</body>
</html>
