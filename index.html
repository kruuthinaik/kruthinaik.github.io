<!DOCTYPE html>
<html>
<head>
    <title>Kruthika's World</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffccd5 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            margin: auto;
        }
        .bio {
            background-color: white;
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #ff1493;
            font-size: 2em;
        }
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .main-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .main-btn:hover {
            background-color: #ff1493;
            transform: scale(1.05);
        }
        .instagram-link {
            margin-top: 40px;
            font-size: 1.2em;
        }
        a {
            color: #ff1493;
            text-decoration: none;
        }
        footer {
            margin-top: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bio">
            <h1>Hi, I'm Kruthika from Bangalore 💋</h1>
            <p>Would you like to explore me? Then you're in the right place.</p>
            <p>Feel free to DM me – always available for you 💕</p>
            <p>📸 Instagram: <a href="https://www.instagram.com/kruthinaik__" target="_blank">@kruthinaik__</a></p>
        </div>

        <div class="button-group">
            <a href="photos.html" class="main-btn">📸 Photos</a>
            <a href="videos.html" class="main-btn">🎥 Videos</a>
        </div>

        <footer>
            <p>💕 Always available for you 💕</p>
        </footer>
    </div>
</body>
</html>
