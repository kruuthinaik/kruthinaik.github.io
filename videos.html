<!DOCTYPE html>
<html>
<head>
    <title>Kruthika's Videos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffccd5 100%);
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        h1 {
            color: #ff1493;
        }
        .back-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
        }
        .number-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .num-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .num-btn:hover {
            background-color: #ff1493;
            transform: scale(1.1);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item video {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .gallery-item p {
            padding: 10px;
            margin: 0;
            color: #333;
        }
        .section-title {
            color: #ff1493;
            font-size: 1.5em;
            margin: 20px 0;
        }
        footer {
            margin-top: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        
        <h1>🎥 My Videos</h1>

        <div class="number-buttons">
            <button class="num-btn" onclick="showCategory(1)">1</button>
            <button class="num-btn" onclick="showCategory(2)">2</button>
            <button class="num-btn" onclick="showCategory(3)">3</button>
            <button class="num-btn" onclick="showCategory(4)">4</button>
            <button class="num-btn" onclick="showCategory(5)">5</button>
            <button class="num-btn" onclick="showCategory(6)">6</button>
            <button class="num-btn" onclick="showCategory(7)">7</button>
            <button class="num-btn" onclick="showCategory(8)">8</button>
            <button class="num-btn" onclick="showCategory(9)">9</button>
            <button class="num-btn" onclick="showCategory(10)">10</button>
        </div>

        <div id="gallery-container"></div>

        <footer>
            <p>💕 Always available for you 💕</p>
        </footer>
    </div>

    <script>
        const baseUrl = 'https://raw.githubusercontent.com/kruuthinaik/kruthinaik.github.io/main/';

        // ========== CATEGORY 1 VIDEOS ==========
        const category1Videos = [
            'WhatsApp%20Video%202026-04-11%20at%2019.56.25.mp4',
            'WhatsApp%20Video%202026-04-11%20at%2019.56.26.mp4'
        ];

        // ========== CATEGORY 2 VIDEOS ==========
        const category2Videos = [
            'WhatsApp%20Video%202026-04-11%20at%2019.56.28.mp4',
            'WhatsApp%20Video%202026-04-11%20at%2019.56.34.mp4'
        ];

        // ========== CATEGORY 3 VIDEOS ==========
        const category3Videos = [
            'WhatsApp%20Video%202026-04-11%20at%2019.56.36.mp4',
            'WhatsApp%20Video%202026-04-11%20at%2019.56.39.mp4'
        ];

        function showCategory(categoryNum) {
            const container = document.getElementById('gallery-container');
            let videos = [];
            let folder = '';

            if (categoryNum === 1) {
                videos = category1Videos;
                folder = 'video1/';
            } else if (categoryNum === 2) {
                videos = category2Videos;
                folder = 'video2/';
            } else if (categoryNum === 3) {
                videos = category3Videos;
                folder = 'video3/';
            } else {
                container.innerHTML = `
                    <h2 class="section-title">🎥 Category ${categoryNum}</h2>
                    <div class="gallery">
                        <div class="gallery-item">
                            <video controls>
                                <source src="https://via.placeholder.com/300x250/dda0dd/white?text=Coming+Soon" type="video/mp4">
                            </video>
                            <p>Coming soon 💕</p>
                        </div>
                    </div>
                `;
                return;
            }

            let galleryHTML = `<h2 class="section-title">🎥 Category ${categoryNum}</h2>`;
            galleryHTML += '<div class="gallery">';
            
            for (let i = 0; i < videos.length; i++) {
                const videoUrl = baseUrl + folder + videos[i];
                galleryHTML += `
                    <div class="gallery-item">
                        <video controls preload="metadata">
                            <source src="${videoUrl}" type="video/mp4">
                            Your browser doesn't support video.
                        </video>
                        <p>🎬 Video</p>
                    </div>
                `;
            }
            
            galleryHTML += '</div>';
            container.innerHTML = galleryHTML;
        }

        // Load category 1 by default
        showCategory(1);
    </script>
</body>
</html>
