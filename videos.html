<!DOCTYPE html>
<html>
<head>
    <title>Kruthika's Videos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffccd5 100%);
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        h1 {
            color: #ff1493;
        }
        .back-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
        }
        .number-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .num-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .num-btn:hover {
            background-color: #ff1493;
            transform: scale(1.1);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item video {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .gallery-item p {
            padding: 10px;
            margin: 0;
            color: #333;
        }
        .section-title {
            color: #ff1493;
            font-size: 1.5em;
            margin: 20px 0;
        }
        .hidden {
            display: none;
        }
        .loading {
            color: #ff69b4;
            font-size: 18px;
            padding: 40px;
        }
        footer {
            margin-top: 40px;
            color: #666;
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            cursor: pointer;
            justify-content: center;
            align-items: center;
        }
        .lightbox video {
            max-width: 90%;
            max-height: 90%;
        }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        
        <h1>🎥 My Videos</h1>

        <div class="number-buttons">
            <button class="num-btn" onclick="showCategory(1)">1</button>
            <button class="num-btn" onclick="showCategory(2)">2</button>
            <button class="num-btn" onclick="showCategory(3)">3</button>
            <button class="num-btn" onclick="showCategory(4)">4</button>
            <button class="num-btn" onclick="showCategory(5)">5</button>
            <button class="num-btn" onclick="showCategory(6)">6</button>
            <button class="num-btn" onclick="showCategory(7)">7</button>
            <button class="num-btn" onclick="showCategory(8)">8</button>
            <button class="num-btn" onclick="showCategory(9)">9</button>
            <button class="num-btn" onclick="showCategory(10)">10</button>
        </div>

        <div id="gallery-container"></div>

        <footer>
            <p>💕 Always available for you 💕</p>
        </footer>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <video id="lightbox-video" controls></video>
    </div>

    <script>
        const videoFolders = [
            'video1', 'video2', 'video3', 'video4', 'video5',
            'video6', 'video7', 'video8', 'video9', 'video10'
        ];

        async function showCategory(categoryNum) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = '<div class="loading">🎥 Loading videos...</div>';
            
            const folderName = videoFolders[categoryNum - 1];
            
            try {
                const response = await fetch(`${folderName}/`);
                const text = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = doc.querySelectorAll('a');
                
                const videoFiles = [];
                for (let link of links) {
                    const href = link.getAttribute('href');
                    if (href && (href.match(/\.(mp4|webm|mov|avi)$/i))) {
                        videoFiles.push(href);
                    }
                }
                
                if (videoFiles.length === 0) {
                    container.innerHTML = `
                        <div class="section-title">🎥 Category ${categoryNum}</div>
                        <div class="gallery">
                            <div class="gallery-item">
                                <video controls>
                                    <source src="https://via.placeholder.com/300x250/dda0dd/white?text=No+Videos+Yet" type="video/mp4">
                                </video>
                                <p>Coming soon 💕</p>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                let galleryHTML = `<h2 class="section-title">🎥 Category ${categoryNum}</h2>`;
                galleryHTML += '<div class="gallery">';
                
                for (let video of videoFiles) {
                    const videoPath = `${folderName}/${video}`;
                    galleryHTML += `
                        <div class="gallery-item">
                            <video controls preload="metadata">
                                <source src="${videoPath}" type="video/mp4">
                                Your browser doesn't support video.
                            </video>
                            <p>🎬 Video</p>
                        </div>
                    `;
                }
                
                galleryHTML += '</div>';
                container.innerHTML = galleryHTML;
                
            } catch (error) {
                container.innerHTML = `
                    <div class="section-title">🎥 Category ${categoryNum}</div>
                    <div class="gallery">
                        <div class="gallery-item">
                            <video controls>
                                <source src="https://via.placeholder.com/300x250/dda0dd/white?text=Create+Folder" type="video/mp4">
                            </video>
                            <p>Create folder: ${folderName}/</p>
                        </div>
                    </div>
                `;
            }
        }

        // Load category 1 by default
        showCategory(1);
    </script>
</body>
</html>
