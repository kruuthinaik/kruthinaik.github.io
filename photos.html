<!DOCTYPE html>
<html>
<head>
    <title>Kruthika's Photos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffccd5 100%);
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        h1 {
            color: #ff1493;
        }
        .back-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
        }
        .number-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .num-btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .num-btn:hover {
            background-color: #ff1493;
            transform: scale(1.1);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #f5f5f5;
        }
        .gallery-item p {
            padding: 10px;
            margin: 0;
            color: #333;
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            cursor: pointer;
            justify-content: center;
            align-items: center;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .section-title {
            color: #ff1493;
            font-size: 1.5em;
            margin: 20px 0;
        }
        .hidden {
            display: none;
        }
        .loading {
            color: #ff69b4;
            font-size: 18px;
            padding: 40px;
        }
        footer {
            margin-top: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        
        <h1>📸 My Photos</h1>

        <div class="number-buttons">
            <button class="num-btn" onclick="showCategory(1)">1</button>
            <button class="num-btn" onclick="showCategory(2)">2</button>
            <button class="num-btn" onclick="showCategory(3)">3</button>
            <button class="num-btn" onclick="showCategory(4)">4</button>
            <button class="num-btn" onclick="showCategory(5)">5</button>
            <button class="num-btn" onclick="showCategory(6)">6</button>
            <button class="num-btn" onclick="showCategory(7)">7</button>
            <button class="num-btn" onclick="showCategory(8)">8</button>
            <button class="num-btn" onclick="showCategory(9)">9</button>
            <button class="num-btn" onclick="showCategory(10)">10</button>
        </div>

        <div id="gallery-container"></div>

        <footer>
            <p>💕 Always available for you 💕</p>
        </footer>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        // List of photo folders
        const photoFolders = [
            'photo1', 'photo2', 'photo3', 'photo4', 'photo5',
            'photo6', 'photo7', 'photo8', 'photo9', 'photo10'
        ];

        let currentCategory = 1;

        async function showCategory(categoryNum) {
            currentCategory = categoryNum;
            const container = document.getElementById('gallery-container');
            container.innerHTML = '<div class="loading">📸 Loading photos...</div>';
            
            const folderName = photoFolders[categoryNum - 1];
            
            try {
                // Fetch list of files from the folder
                const response = await fetch(`${folderName}/`);
                const text = await response.text();
                
                // Parse HTML to get file list
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = doc.querySelectorAll('a');
                
                const imageFiles = [];
                for (let link of links) {
                    const href = link.getAttribute('href');
                    if (href && (href.match(/\.(jpg|jpeg|png|gif|webp)$/i))) {
                        imageFiles.push(href);
                    }
                }
                
                if (imageFiles.length === 0) {
                    container.innerHTML = `
                        <div class="section-title">📸 Category ${categoryNum}</div>
                        <div class="gallery">
                            <div class="gallery-item">
                                <img src="https://via.placeholder.com/300x250/dda0dd/white?text=No+Photos+Yet" alt="Empty">
                                <p>Coming soon 💕</p>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                // Build gallery HTML
                let galleryHTML = `<h2 class="section-title">📸 Category ${categoryNum}</h2>`;
                galleryHTML += '<div class="gallery">';
                
                for (let img of imageFiles) {
                    const imgPath = `${folderName}/${img}`;
                    galleryHTML += `
                        <div class="gallery-item" onclick="openLightbox('${imgPath}')">
                            <img src="${imgPath}" alt="Photo">
                            <p>❤️</p>
                        </div>
                    `;
                }
                
                galleryHTML += '</div>';
                container.innerHTML = galleryHTML;
                
            } catch (error) {
                console.log('Folder not found:', folderName);
                container.innerHTML = `
                    <div class="section-title">📸 Category ${categoryNum}</div>
                    <div class="gallery">
                        <div class="gallery-item">
                            <img src="https://via.placeholder.com/300x250/dda0dd/white?text=Create+Folder" alt="Empty">
                            <p>Create folder: ${folderName}/</p>
                        </div>
                    </div>
                `;
            }
        }

        function openLightbox(imgSrc) {
            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // Load category 1 by default
        showCategory(1);
    </script>
</body>
</html>
