<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kruthika's Photos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        /* Background Slideshow */
        .background-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .bg-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .bg-media.active { opacity: 1; z-index: 1; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Glassmorphism Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 16px 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: white;
            font-size: 1.6rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .back-btn {
            background: linear-gradient(135deg, rgba(255,105,180,0.9), rgba(255,20,147,0.9));
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.25s ease;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        /* Small Number Buttons */
        .number-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .num-btn {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            color: #ff1493;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .num-btn:hover {
            background: #ff1493;
            color: white;
            transform: scale(1.08);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .gallery-item {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
        }
        .gallery-item img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-item p {
            padding: 8px;
            color: #ff1493;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
        }
        .section-title {
            color: white;
            font-size: 1.3rem;
            margin: 20px 0 15px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 0.7rem;
            text-align: center;
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 36px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

    <div class="glass-header">
        <h1>📸 My Photos</h1>
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
    </div>
    <div class="number-buttons" id="numButtons"></div>
    <div id="gallery-container"></div>
    <footer><p>💕 Always available for you 💕</p></footer>
</div>
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    <img id="lightbox-img" src="">
</div>

    ];
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    let mediaList = shuffleArray([...backgroundMedia]);
    let currentIndex = 0;
    function createMediaElement(media) {
        if (media.type === 'image') { const img = document.createElement('img'); img.src = media.url; img.className = 'bg-media'; return img; }
        else { const video = document.createElement('video'); video.src = media.url; video.muted = true; video.loop = false; video.playsInline = true; video.className = 'bg-media'; return video; }
    }
    function playNext() {
        const container = document.getElementById('bgSlideshow');
        const currentActive = container.querySelector('.bg-media.active');
        const media = mediaList[currentIndex % mediaList.length];
        const newElement = createMediaElement(media);
        container.appendChild(newElement);
        setTimeout(() => newElement.classList.add('active'), 50);
        if (currentActive) { setTimeout(() => { if (currentActive.parentNode) currentActive.remove(); }, 1500); }
        if (media.type === 'image') {
            setTimeout(() => { if (document.body.contains(newElement)) { currentIndex++; playNext(); } }, 5000);
        } else {
            const video = newElement;
            video.play().catch(e => console.log("Autoplay:", e));
            video.onended = () => { if (document.body.contains(video)) { currentIndex++; playNext(); } };
        }
        currentIndex++;
    }
    playNext();

    // PHOTO GALLERY DATA
    const baseUrl = 'https://raw.githubusercontent.com/kruuthinaik/kruthinaik.github.io/main/';
    const category1Photos = [

    const allCategories = [category1Photos, category2Photos, category3Photos];
    
    // Generate number buttons dynamically
    const numDiv = document.getElementById('numButtons');
    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = 'num-btn';
        btn.onclick = () => showCategory(i);
        numDiv.appendChild(btn);
    }
    function showCategory(catNum) {
        const container = document.getElementById('gallery-container');
        const idx = catNum - 1;
        if (idx < allCategories.length && allCategories[idx].length > 0) {
            const photos = allCategories[idx];
            const folder = `photo${catNum}/`;
            let html = `<h2 class="section-title">📸 Category ${catNum}</h2><div class="gallery">`;
            photos.forEach(photo => {
                const imgUrl = baseUrl + folder + photo;
                html += `<div class="gallery-item" onclick="openLightbox('${imgUrl}')"><img src="${imgUrl}" alt="Photo"><p>❤️</p></div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        } else {
            container.innerHTML = `<h2 class="section-title">📸 Category ${catNum}</h2><div class="gallery"><div class="gallery-item"><img src="https://via.placeholder.com/300x250/dda0dd/white?text=Coming+Soon" alt="Soon"><p>Coming soon 💕</p></div></div>`;
        }
    }
    function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
    showCategory(1);

</html>
