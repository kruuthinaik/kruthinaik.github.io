<!DOCTYPE html>
<html>
<head>
    <title>Kruthika's Photos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
            background-image: url('IMG_8998.WEBP');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .back-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        .number-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .num-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #ff1493;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .num-btn:hover {
            background: #ff1493;
            color: white;
            transform: scale(1.1);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery-item {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f5f5f5;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item p {
            padding: 10px;
            margin: 0;
            color: #ff1493;
            font-weight: 600;
            font-size: 14px;
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-lightbox:hover {
            color: #ff1493;
        }

        .section-title {
            color: white;
            font-size: 1.5em;
            margin: 20px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        
        <h1>📸 My Photos</h1>

        <div class="number-buttons">
            <button class="num-btn" onclick="showCategory(1)">1</button>
            <button class="num-btn" onclick="showCategory(2)">2</button>
            <button class="num-btn" onclick="showCategory(3)">3</button>
            <button class="num-btn" onclick="showCategory(4)">4</button>
            <button class="num-btn" onclick="showCategory(5)">5</button>
            <button class="num-btn" onclick="showCategory(6)">6</button>
            <button class="num-btn" onclick="showCategory(7)">7</button>
            <button class="num-btn" onclick="showCategory(8)">8</button>
            <button class="num-btn" onclick="showCategory(9)">9</button>
            <button class="num-btn" onclick="showCategory(10)">10</button>
        </div>

        <div id="gallery-container"></div>

        <footer>
            <p>💕 Always available for you 💕</p>
        </footer>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        const baseUrl = 'https://raw.githubusercontent.com/kruuthinaik/kruthinaik.github.io/main/';

        const category1Photos = [
            'WhatsApp%20Image%202026-04-11%20at%2019.56.21%20(1).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.21.jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.22%20(1).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.22%20(2).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.22%20(3).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.22.jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.23%20(1).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.23%20(2).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.23%20(3).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.23.jpeg'
        ];

        const category2Photos = [
            'WhatsApp%20Image%202026-04-11%20at%2019.56.26%20(1).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.26.jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.27%20(1).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.27%20(2).jpeg',
            'WhatsApp%20Image%202026-04-11%20at%2019.56.27.jpeg'
        ];

        const category3Photos = [
            'WhatsApp%20Image%202026-04-11%20at%2019.56.40.jpeg'
        ];

        function showCategory(categoryNum) {
            const container = document.getElementById('gallery-container');
            let photos = [];
            let folder = '';

            if (categoryNum === 1) {
                photos = category1Photos;
                folder = 'photo1/';
            } else if (categoryNum === 2) {
                photos = category2Photos;
                folder = 'photo2/';
            } else if (categoryNum === 3) {
                photos = category3Photos;
                folder = 'photo3/';
            } else {
                container.innerHTML = `
                    <h2 class="section-title">📸 Category ${categoryNum}</h2>
                    <div class="gallery">
                        <div class="gallery-item">
                            <img src="https://via.placeholder.com/300x250/dda0dd/white?text=Coming+Soon" alt="Coming Soon">
                            <p>Coming soon 💕</p>
                        </div>
                    </div>
                `;
                return;
            }

            let galleryHTML = `<h2 class="section-title">📸 Category ${categoryNum}</h2>`;
            galleryHTML += '<div class="gallery">';
            
            for (let i = 0; i < photos.length; i++) {
                const imgUrl = baseUrl + folder + photos[i];
                galleryHTML += `
                    <div class="gallery-item" onclick="openLightbox('${imgUrl}')">
                        <img src="${imgUrl}" alt="Photo">
                        <p>❤️</p>
                    </div>
                `;
            }
            
            galleryHTML += '</div>';
            container.innerHTML = galleryHTML;
        }

        function openLightbox(imgSrc) {
            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        showCategory(1);
    </script>
</body>
</html>
