<!DOCTYPE html>
<html>
<head>
    <title>Private Gallery</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
            background-image: url('IMG_8998.WEBP');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: auto;
            padding: 40px 20px;
        }

        h1 {
            color: #ff69b4;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .back-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        .private-badge {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 25px;
            margin: 30px 0;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .private-badge h2 {
            color: #ff1493;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .private-badge p {
            color: #555;
            font-size: 1.1em;
        }

        .coming-soon {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            color: white;
            animation: fadeInUp 0.8s ease;
        }

        .coming-soon h3 {
            color: #ff69b4;
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        footer {
            margin-top: 50px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        
        <h1>🔒 PRIVATE GALLERY</h1>

        <div class="private-badge">
            <h2>🔞 Exclusive Content 🔞</h2>
            <p>Only for special eyes 👀</p>
        </div>

        <div class="coming-soon">
            <h3>✨ Coming Soon ✨</h3>
            <p>Private photos and videos will appear here</p>
            <p style="margin-top: 15px; font-size: 12px;">🔒 Password protected area</p>
        </div>

        <footer>
            <p>🔒 Private & Exclusive 🔒</p>
        </footer>
    </div>
</body>
</html>
