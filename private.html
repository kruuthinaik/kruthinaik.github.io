<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Private Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .background-slideshow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .bg-media { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .bg-media.active { opacity: 1; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 2; pointer-events: none; }
        .container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .glass-header { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(15px); border-radius: 32px; padding: 16px 24px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border: 1px solid rgba(255,255,255,0.2); }
        h1 { color: #ff9bcb; font-size: 1.6rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .back-btn { background: linear-gradient(135deg, rgba(255,105,180,0.9), rgba(255,20,147,0.9)); color: white; border: none; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.25s ease; }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .private-badge { text-align: center; margin-bottom: 25px; }
        .private-badge span { background: rgba(255,20,147,0.8); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 40px; color: white; font-weight: bold; font-size: 0.8rem; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .gallery-item { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); border-radius: 18px; overflow: hidden; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); transition: all 0.3s ease; }
        .gallery-item:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25); }
        .gallery-item video { width: 100%; height: 200px; object-fit: cover; }
        .gallery-item p { padding: 8px; color: #ff1493; font-weight: 600; font-size: 0.75rem; text-align: center; }
        footer { margin-top: 40px; color: rgba(255,255,255,0.7); font-size: 0.7rem; text-align: center; }
    </style>
</head>

    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    let mediaList = shuffleArray([...backgroundMedia]);
    let currentIndex = 0;
    function createMediaElement(media) {
        if (media.type === 'image') { const img = document.createElement('img'); img.src = media.url; img.className = 'bg-media'; return img; }
        else { const video = document.createElement('video'); video.src = media.url; video.muted = true; video.loop = false; video.playsInline = true; video.className = 'bg-media'; return video; }
    }
    function playNext() {
        const container = document.getElementById('bgSlideshow');
        const currentActive = container.querySelector('.bg-media.active');
        const media = mediaList[currentIndex % mediaList.length];
        const newElement = createMediaElement(media);
        container.appendChild(newElement);
        setTimeout(() => newElement.classList.add('active'), 50);
        if (currentActive) { setTimeout(() => { if (currentActive.parentNode) currentActive.remove(); }, 1500); }
        if (media.type === 'image') {
            setTimeout(() => { if (document.body.contains(newElement)) { currentIndex++; playNext(); } }, 5000);
        } else {
            const video = newElement;
            video.play().catch(e => console.log("Autoplay:", e));
            video.onended = () => { if (document.body.contains(video)) { currentIndex++; playNext(); } };
        }
        currentIndex++;
    }
